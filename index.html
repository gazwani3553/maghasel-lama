<script>
const prices={

"ثوب":{

"غسيل عادي":8,

"غسيل مستعجل":12,

"كوي عادي":6,

"كوي مستعجل":9

},

"شماغ":{

"غسيل عادي":5,

"غسيل مستعجل":8,

"كوي عادي":4,

"كوي مستعجل":6

},

"فستان":{

"غسيل عادي":18,

"غسيل مستعجل":25,

"كوي عادي":12,

"كوي مستعجل":18

}

};
let orderId="";

let orders=[];
document
.getElementById(
"addItem"
)

.onclick=

function(){

let item=

document
.querySelector(
'[name=service]'
)
.value
.trim();

let qty=

document
.querySelector(
'[name=qty]'
)
.value;
let sum=0;

orders.forEach(

row=>{

if(

row.includes(
"ريال"
)

){

let price=

row.split(
"—"
)[1];

if(

price

){

price=

price
.replace(
"ريال",
""
)
.trim();

if(

!isNaN(
price
)

){

sum+=
Number(
price
);

}

}

}

}

);

document
.getElementById(
"total"
)
.innerHTML=

"💰 الإجمالي: "+

sum+

" ريال";
let service=

document
.querySelector(
'[name=speed]'
)
.value
.trim();


if(

!service

){

alert( 
"⚡ اختر نوع الخدمة أولاً"
);

return;

}

if(

!item

){

alert(
"🧺 اختر الصنف"
);

return;

}

let price=

prices[
item.trim()
]

?.[
service.trim()
]

??

0;
 console.log(
item,
service,
price
);

let total=

item==="أخرى"

?

"يتم تحديد السعر بعد الفرز"

:

price*
qty;

orders.push(

"⚡ "+

service+

" | 🧺 "+

item+

" × "+

qty+

" — "+

total+

(

item==="أخرى"

?

""

:

" ريال"

)
);


document
.getElementById(
"cart"
)
.style.display=

"block";
let sum=0;

orders.forEach(

row=>{

let match=

row.match(

/—\s*(\d+)\sريال/

);

if(
match
){

sum+=
Number(
match[1]
);

}

}

);

document
.getElementById(
"total"
)
.innerHTML=

"💰 الإجمالي: "+

sum+

" ريال";
document
.getElementById(
"items"
)
.innerHTML=

orders

.map(

(x,i)=>

"<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px'>" +

"<span>"+x+"</span>" +

"<span onclick='removeItem("+i+")' style='cursor:pointer;color:#ef4444;font-size:20px'>🗑️</span>" +

"</div>"

)

.join("");


document
.querySelector(
'[name=service]'
)
.selectedIndex=0;

document
.querySelector(
'[name=qty]'
)
.value=1;

};

function removeItem(index){

orders.splice(
index,
1
);

if(
orders.length===0
){

document
.getElementById(
"cart"
)
.style.display=
"none";

document
.getElementById(
"items"
)
.innerHTML="";

return;

}

document
.getElementById(
"items"
)
.innerHTML=

orders

.map(

(x,i)=>

"<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px'>" +

"<span>"+x+"</span>" +

"<span onclick='removeItem("+i+")' style='cursor:pointer;color:#ff3b30;font-size:20px'>🗑️</span>" +

"</div>"

)

.join("");

}


function getLocation(){

if(

navigator.geolocation

){

navigator
.geolocation
.getCurrentPosition(

function(position){

let lat=

position.coords.latitude;

let lng=

position.coords.longitude;

document
.querySelector(
'[name=address]'
)
.value=

`https://maps.google.com/?q=${lat},${lng}`; 

},

function(){

alert(

"⚠️ تعذر الحصول على الموقع"

);

}

);

}

else{

alert(

"⚠️ الجهاز لا يدعم الموقع" 

);

}

}

function sendWhatsApp(){
 if(

orders.length===0

){

alert(

"🧺 يرجى الضغط على (➕ إضافة للطلب) بعد اختيار الصنف وعدد القطع"

);

return;

}

let requiredFields=[

'name',

'phone',

'address',

'unit',

'speed',

'delivery',

'date',

'time'

];


for(

let field of requiredFields

){

let value=

document
.querySelector(
`[name="${field}"]`
)
.value
.trim();

if(

!value

){

document
.querySelector(
`[name="${field}"]`
)
.style.borderColor=

"#ff3b30";
document
.querySelector(
`[name="${field}"]`
)
.oninput=

function(){

this.style.borderColor=

"#dbe7ff";

};

alert(

"⚠️ يرجى تعبئة جميع الحقول"

);

document
.querySelector(
`[name="${field}"]`
)
.focus();

return;

}


}

orderId=
"LM-"+
Math.floor(
1000+
Math.random()*9000
);



let text=

`🧺 طلب جديد

📦 ${orderId}

👤 ${document.querySelector('[name=name]').value}

📱 ${document.querySelector('[name=phone]').value}

📍 ${document.querySelector('[name=address]').value}

🏠 ${document.querySelector('[name=unit]').value}

⚡ ${document.querySelector('[name=speed]').value}
🧺 الأصناف:

${orders.join("\n")}

🚚 ${document.querySelector('[name=delivery]').value}

📅 ${document.querySelector('[name=date]').value}

⏰ ${document.querySelector('[name=time]').value}

📝 ${document.querySelector('[name=message]').value}`;
if(

!confirm(

`🧺 مراجعة الطلب

👤 ${document.querySelector('[name=name]').value}

🧺

${orders.join("\n")}

🚚 ${document.querySelector('[name=delivery]').value}

📅 ${document.querySelector('[name=date]').value}

⏰ ${document.querySelector('[name=time]').value}

تأكيد الإرسال؟`

)

){

return;

}

alert(

`🎉 شكراً لاختياركم مغاسل لمى الذكية

📲 سوف يتم إرسال الطلب لفريق المغسلة

🚚 سوف يتواصل معك المندوب قريباً`

);


window.open(
"https://wa.me/966534043553?text=" 
+
encodeURIComponent(text),
"_blank"
);

document
.getElementById(
"order"
)
.innerHTML=

"📦 رقم الطلب: "+orderId;

document
.getElementById(
"ok"
)
.style.display=
"block";

}

</script>
