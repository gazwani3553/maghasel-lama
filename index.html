<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>مغاسل لمى الذكية</title>

<link rel="icon" href="logo.png.png">
<meta name="theme-color" content="#1677ea">

<style>

body{
margin:0;
padding:15px;
font-family:Arial;
background:
linear-gradient(
180deg,
#eef5ff,
#f7fbff
);
}

.header{

background:
linear-gradient(
135deg,
#1677ea,
#3f97ff
);

padding:30px;

text-align:center;

color:white;

border-radius:24px;

margin-bottom:20px;

}

.logo{

width:170px;

background:white;

padding:12px;

border-radius:24px;

}

.subtitle{

margin-top:12px;

font-size:18px;

opacity:.95;

}

.box{

background:white;

max-width:550px;

margin:auto;

padding:22px;

border-radius:24px;

box-shadow:
0 10px 30px
rgba(
0,
0,
0,
0.08
);

}

input,
select,
textarea{

width:100%;

padding:16px;

margin:10px 0;

border-radius:16px;

border:
1px solid #dbe7ff;

font-size:16px;

box-sizing:border-box;

}

input:focus,
select:focus,
textarea:focus{

outline:none;

border-color:#1677ea;

box-shadow:
0 0 0 4px
rgba(
22,
119,
234,
0.15
);

}

textarea{

height:50px;

}

button{

width:100%;

padding:16px;

border:none;

border-radius:18px;

font-size:18px;

cursor:pointer;

}

.whatsapp{

background:
linear-gradient(
135deg,
#25D366,
#1cb557
);

color:white;

}

.success{

display:none;

background:#f3fff6;

padding:18px;

margin-top:20px;

border-radius:18px;

}

label{

display:block;

margin-bottom:6px;

font-weight:bold;

}

</style>


</head>

<body>

<div class="header">

<img src="logo.png.png" class="logo">

<div class="subtitle">
استلام • غسيل • توصيل
</div>

</div>

<div class="box">

<input type="text" name="name" placeholder="الاسم" required>

<input type="tel" name="phone" placeholder="رقم الجوال" required>

<input type="text" name="address" placeholder="العنوان" required>

<input type="text" name="unit" placeholder="رقم الشقة / رقم الاشتراك" required>

<select name="speed" required>
<option value="">⚡ نوع الخدمة</option>
<option>غسيل مستعجل</option>
<option>كوي مستعجل</option>
<option>غسيل عادي</option>
<option>كوي عادي</option>
</select>

<select name="service" required>
<option value="">🧺 اختر الخدمة</option>
<option>غسيل ملابس</option>
<option>كي ملابس</option>
<option>غسيل بطانيات</option>
<option>غسيل سجاد</option>
<option>غسيل عبايات</option>
<option>غسيل ملابس أطفال</option>
</select>

<select name="delivery" required>
<option value="">🚚 طريقة الاستلام</option>
<option>استلام من المنزل</option>
<option>تسليم للمغسلة</option>
<option>استلام + توصيل</option>
</select>

<label>

📅 تاريخ الاستلام

</label>

<input
type="date"
name="date"
required

>

<label>

⏰ وقت الاستلام

</label>

<input
type="time"
name="time"
required

>


<textarea
name="message"
placeholder="تفاصيل إضافية"
></textarea>
<a<button
type="button"

onclick="
window.open(
https://maps.app.goo.gl/X3DCZouZMiT2bLnj6
'_blank'
)
"

style="
width:100%;

height:72px;

background:white;

border:
2px solid #2f73ff;

border-radius:16px;

display:flex;

align-items:center;

justify-content:center;

gap:10px;

font-size:16px;

font-weight:700;

color:#2f73ff;

margin-top:12px;

cursor:pointer;
"

>

<span
style="
font-size:30px;
"

>

📍

</span>

<span>

موقع المغسلة على الخريطة

</span>

</button>


</a>

<button
class="whatsapp"
onclick="sendWhatsApp()"

>

إرسال واتساب 📲

</button>

<div
class="success"
id="ok"
>

<h3>
🧺 تم استلام طلبك بنجاح
</h3>

<p id="order"></p>

<p>
🚚 سوف يتواصل معك مندوب التوصيل قريبًا
</p>

<p>
📍 يرجى التأكد من صحة العنوان ورقم الجوال
</p>

<hr>

<div style="text-align:center">

✨ شكراً لاختياركم مغاسل لمى الذكية

<br><br>

💙 يسعدنا خدمتكم دائماً

</div>

</div>

</div>

<script>

let orderId="";

function sendWhatsApp(){

orderId=
"LM-"+
Math.floor(
1000+
Math.random()*9000
);

let text=

`🧺 طلب جديد

📦 ${orderId}

👤 ${document.querySelector('[name=name]').value}

📱 ${document.querySelector('[name=phone]').value}

📍 ${document.querySelector('[name=address]').value}

🏠 ${document.querySelector('[name=unit]').value}

⚡ ${document.querySelector('[name=speed]').value}

🧼 ${document.querySelector('[name=service]').value}

🚚 ${document.querySelector('[name=delivery]').value}

📅 ${document.querySelector('[name=date]').value}

⏰ ${document.querySelector('[name=time]').value}

📝 ${document.querySelector('[name=message]').value}`;

window.open(
"https://wa.me/966534043553?text="
+
encodeURIComponent(text),
"_blank"
);

document
.getElementById(
"order"
)
.innerHTML=

"📦 رقم الطلب: "+orderId;

document
.getElementById(
"ok"
)
.style.display=
"block";

}

</script>

</body>

</html>
