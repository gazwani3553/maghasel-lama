<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>مغاسل لمى الذكية</title>

<link rel="icon" href="logo.png.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1677ea">

<style>

body{
margin:0;
font-family:Arial;
background:#eef3fb;
}

.header{
background:#1677ea;
padding:35px;
text-align:center;
color:white;
}

.logo{
width:220px;
background:white;
padding:10px;
border-radius:30px;
}

.subtitle{
margin-top:15px;
}

.box{
background:white;
max-width:550px;
margin:25px auto;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

input,
select,
textarea{
width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:1px solid #ddd;
box-sizing:border-box;
}

textarea{
height:90px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

.whatsapp{
background:#25D366;
color:white;
}

.success{
display:none;
background:#e8fff0;
padding:18px;
margin-top:20px;
border-radius:15px;
}

</style>

</head>

<body>

<div class="header">

<img
src="logo.png.png"
class="logo"

>

<div class="subtitle">

استلام • غسيل • توصيل

</div>

</div>

<div class="box">

<input
type="text"
name="name"
placeholder="الاسم"
required

>

<input
type="tel"
name="phone"
placeholder="رقم الجوال"
required

>

<input
type="text"
name="address"
placeholder="العنوان"
required
>
<input
type="text"
name="unit"
placeholder="رقم الشقة / رقم الاشتراك"
required

>
  


<select
name="speed"
required
>

<option>🧺 نوع الخدمة</option>
<option>غسيل مستعجل</option>
<option>كوي مستعجل</option>
<option>غسيل عادي</option>
<option>كوي عادي</option>
</select>

 <select
name="service"
required
  
>

<option>🧺 اختر الخدمة</option>
<option>غسيل ملابس</option>
<option>كي ملابس</option>
<option>غسيل بطانيات</option>
<option>غسيل سجاد</option>
<option>غسيل عبايات</option>
<option>غسيل ملابس أطفال</option>

 </select>
<select
name="delivery"
required

>


<option>🚚 طريقة الاستلام</option>

<option>استلام من المنزل</option>

<option>تسليم للمغسلة</option>

<option>استلام + توصيل</option>

</select>

<input
type="date"
name="date"
required

>


<input
type="time"
name="time"
required

>


<textarea
name="message"
placeholder="تفاصيل إضافية"
></textarea>

<button
class="whatsapp"
onclick="sendWhatsApp();setTimeout(successMessage,1000);"


>

إرسال واتساب 📲

</button>

<div
class="success"
id="ok"
>

<h3>

🧺 تم استلام طلبك بنجاح

</h3>

<p id="order"></p>

<p>

🚚 سوف يتواصل معك مندوب التوصيل قريبًا.

</p>

<p>

📍 يرجى التأكد من صحة العنوان ورقم الجوال.

</p>

<hr>


<p style="text-align:center;font-size:18px">
<hr>

<div
style="
text-align:center;
padding:10px;
line-height:2;
"
>

<hr>

<div
style="
text-align:center;
padding:15px;
line-height:2;
font-size:18px;
"
>

✨ شكراً لاختياركم مغاسل لمى الذكية

<br><br>

🧺 تم استلام طلبكم بنجاح

<br><br>

💙 يسعدنا خدمتكم دائماً

</div>

</div>
 ✨

</p>


</div>

</div>

<script>

let orderId="";

function sendWhatsApp(){

if(orderId===""){

orderId=
"LM-"+
Math.floor(
1000+
Math.random()*9000
);

}

let text=

`🧺 طلب جديد

📦 رقم الطلب:
${orderId}

👤 ${document.querySelector('[name=name]').value}

📱 ${document.querySelector('[name=phone]').value}

📍 ${document.querySelector('[name=address]').value}

🏠 ${document.querySelector('[name=unit]').value}

🧼 ${document.querySelector('[name=service]').value}

🚚 ${document.querySelector('[name=delivery]').value}

📅 ${document.querySelector('[name=date]').value}

⏰ ${document.querySelector('[name=time]').value}

📝 ${document.querySelector('[name=message]').value}`;

window.open(
"https://wa.me/966534043553?text="
+
encodeURIComponent(text)
);


setTimeout(
successMessage,
500
);

}

function successMessage(){

document
.getElementById(
"order"
)
.innerHTML=

"📦 رقم الطلب: "
+

orderId;

document
.getElementById(
"ok"
)
.style.display=
"block";

}

</script>


</body>

</html>
